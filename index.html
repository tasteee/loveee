<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<title>look | listen | love</title>
		<link rel="stylesheet" href="index.css" />
	</head>
	<body>
		<div class="export-header art-header">
			<div class="art-content">
				<h1 class="export-title art-title">
					<span class="title-left">🦊 Mekalye</span>
					<span class="heart-emoji" style="display: inline-block; transition: transform 0.3s ease">💖</span>
					<span class="title-right">Shane 🐺</span>
				</h1>
			</div>
		</div>
		<div class="page">
			<div class="messages-list"></div>
			<div class="toolbar">
				<button class="toolbar-btn" id="btn-prev-day" title="Jump to previous day">
					<svg
						width="12"
						height="12"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="m15 18-6-6 6-6" />
					</svg>
					<span id="label-prev-day">Start</span>
				</button>
				<div class="toolbar-divider"></div>
				<button class="toolbar-btn" id="btn-search" title="Search messages (Ctrl+F)">
					<svg
						width="12"
						height="12"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<circle cx="11" cy="11" r="8" />
						<path d="m21 21-4.3-4.3" />
					</svg>
					Search
				</button>
				<div class="toolbar-divider"></div>
				<button class="toolbar-btn" id="btn-next-day" title="Jump to next day">
					<span id="label-next-day">End</span>
					<svg
						width="12"
						height="12"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="m9 18 6-6-6-6" />
					</svg>
				</button>
			</div>
			<div class="search-panel" id="search-panel">
				<div class="search-input-wrapper">
					<svg
						class="search-icon"
						width="14"
						height="14"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<circle cx="11" cy="11" r="8" />
						<path d="m21 21-4.3-4.3" />
					</svg>
					<input
						type="text"
						id="search-text-input"
						class="search-text-input"
						placeholder="Search messages..."
						autocomplete="off"
						spellcheck="false"
					/>
					<span id="search-count-label" class="search-count-label"></span>
					<button id="btn-search-submit" class="search-submit-btn" title="Search">
						<svg
							width="14"
							height="14"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2.5"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<circle cx="11" cy="11" r="8" />
							<path d="m21 21-4.3-4.3" />
						</svg>
					</button>
				</div>
				<div class="search-results-list" id="search-results-list"></div>
			</div>
		</div>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
		<script src="index.js"></script>
	</body>
</html>
